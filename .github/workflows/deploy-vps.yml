name: Deploy to VPS (ps.kz)

# По умолчанию запускается ВРУЧНУЮ (вкладка Actions → этот workflow → Run workflow),
# чтобы не падать, пока не добавлены секреты. Когда в настройках репозитория
# (Settings → Secrets and variables → Actions) появятся секреты:
#   VPS_HOST     — IP или домен сервера
#   VPS_USER     — пользователь SSH (например, deploy)
#   VPS_SSH_KEY  — приватный SSH-ключ (весь файл целиком)
#   VPS_PATH     — путь вебрута (необязательно, по умолчанию /var/www/aquauzel)
# можно раскомментировать блок push ниже — и сайт будет деплоиться автоматически
# при каждом изменении aquauzel-site/.

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'aquauzel-site/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy aquauzel-site via rsync over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          : "${VPS_HOST:?нужен секрет VPS_HOST}"
          : "${VPS_USER:?нужен секрет VPS_USER}"
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes" \
            aquauzel-site/ "$VPS_USER@$VPS_HOST:${VPS_PATH:-/var/www/aquauzel}/"
          echo "✓ Деплой на VPS завершён."
