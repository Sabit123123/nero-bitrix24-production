name: Deploy AquaUzel site to GitHub Pages

# Публикует папку aquauzel-site на GitHub Pages.
# configure-pages с enablement:true пытается включить Pages автоматически.
# Итоговый адрес — кастомный домен из aquauzel-site/CNAME: https://aquauzel.kz

on:
  push:
    branches: [main]
    paths:
      - 'aquauzel-site/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: aquauzel-site
      - id: deployment
        uses: actions/deploy-pages@v4
