<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>AquaUzel — Админка товаров</title>
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css?v=3">
<link rel="stylesheet" href="assets/css/admin.css?v=5">
</head>
<body class="admin">

<!-- Supabase не настроен -->
<div id="needConfig" class="adm-screen" hidden>
  <div class="adm-card adm-msg">
    <h1>Админка не настроена</h1>
    <p>Чтобы включить админку, заполните <code>assets/js/supabase-config.js</code> (URL и anon-ключ проекта Supabase) и выполните <code>supabase/schema.sql</code>. Подробности — в <code>supabase/README.md</code>.</p>
    <a class="btn btn-ghost" href="index.html">← На сайт</a>
  </div>
</div>

<!-- Вход -->
<div id="login" class="adm-screen" hidden>
  <form class="adm-card adm-login" id="loginForm" autocomplete="on">
    <img src="assets/img/logo-full.png" alt="AquaUzel" height="56">
    <h1>Вход в админку</h1>
    <input type="text" id="email" autocomplete="username" hidden>
    <label>Пароль<input type="password" id="password" required autocomplete="current-password" autofocus></label>
    <button class="btn btn-primary" type="submit" id="loginBtn">Войти</button>
    <p class="adm-error" id="loginError" hidden></p>
    <a class="adm-link" href="index.html">← Вернуться на сайт</a>
  </form>
</div>

<!-- Приложение -->
<div id="app" class="adm-app" hidden>
  <header class="adm-top">
    <button type="button" class="adm-brand" id="brandEgg" title="AquaUzel"><img src="assets/img/logo-full.png" alt="AquaUzel" height="40"></button>
    <span class="adm-title">Товары</span>
    <span class="adm-user" id="userEmail"></span>
    <button class="btn btn-ghost btn-sm" id="logoutBtn" type="button">Выйти</button>
  </header>

  <div class="adm-toolbar">
    <div class="adm-search">
      <svg class="adm-search-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="search" id="search" placeholder="Поиск по названию, категории, характеристикам…" autocomplete="off">
    </div>
    <div class="adm-filters">
      <label class="adm-filter" title="Категория">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.41 2.41 0 0 0 3.41 0l6.59-6.59a2.41 2.41 0 0 0 0-3.41z"/><circle cx="7.5" cy="7.5" r="1.5"/></svg>
        <select id="filterCat" class="adm-select" aria-label="Категория"><option value="">Все категории</option></select>
        <i class="adm-filter-dot"></i>
      </label>
      <label class="adm-filter" title="Наличие">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
        <select id="filterStock" class="adm-select" aria-label="Наличие">
          <option value="">Все</option><option value="1">В наличии</option><option value="0">Нет в наличии</option>
        </select>
        <i class="adm-filter-dot"></i>
      </label>
      <label class="adm-filter" title="Сортировка">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 16 4 4 4-4"/><path d="M7 20V4"/><path d="m21 8-4-4-4 4"/><path d="M17 4v16"/></svg>
        <select id="sortBy" class="adm-select" aria-label="Сортировка">
          <option value="name">По названию</option><option value="category">По категории</option>
          <option value="price">По цене</option><option value="updated">По изменению</option>
        </select>
        <i class="adm-filter-dot"></i>
      </label>
      <label class="adm-filter" title="Вид отображения">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
        <select id="viewMode" class="adm-select" aria-label="Вид отображения">
          <option value="cards">Вид: карточки</option>
          <option value="list">Вид: список</option>
          <option value="compact">Вид: компактно</option>
        </select>
        <i class="adm-filter-dot"></i>
      </label>
    </div>
    <button class="btn btn-primary" id="addBtn" type="button">+ Добавить товар</button>
  </div>

  <p class="adm-error adm-load-error" id="loadError" hidden></p>
  <p class="adm-count" id="count"></p>
  <div class="adm-grid" id="products"></div>
  <p class="adm-empty" id="empty" hidden>Товаров пока нет. Нажмите «Добавить товар».</p>
</div>

<div class="adm-toast" id="toast" hidden></div>

<!-- пасхалка (только на админке можно заменить картинку) -->
<img id="vova" class="vova-egg" alt="" aria-hidden="true" data-src="assets/img/vova.png">
<input type="file" id="vovaFile" accept="image/*" hidden>

<!-- шаблон карточки товара -->
<template id="cardTpl">
  <article class="adm-product" data-id="">
    <div class="adm-photo">
      <img class="adm-prev" alt="" hidden>
      <div class="adm-photo-ph">Фото</div>
      <div class="adm-photo-busy" hidden>Загрузка…</div>
      <div class="adm-photo-actions">
        <label class="adm-photo-btn" title="Сфотографировать на камеру телефона">
          <input type="file" accept="image/*" capture="environment" hidden>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
          <span>Камера</span>
        </label>
        <label class="adm-photo-btn" title="Выбрать из галереи или файлов">
          <input type="file" accept="image/*" hidden>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.09-3.09a2 2 0 0 0-2.82 0L6 21"/></svg>
          <span>Галерея</span>
        </label>
      </div>
      <button type="button" class="adm-photo-del" hidden>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        <span>Удалить фото</span>
      </button>
    </div>
    <div class="adm-fields">
      <label>Наименование<input class="f-name" type="text"></label>
      <div class="adm-row2">
        <label>Кол-во в упаковке<input class="f-pack" type="text" inputmode="numeric"></label>
        <label>Цена, ₸<input class="f-price" type="number" inputmode="decimal" min="0" step="1"></label>
      </div>
      <label>Категория<input class="f-cat" type="text" list="catList"></label>
      <label>Характеристики<textarea class="f-char" rows="2"></textarea></label>
      <label class="adm-check"><input class="f-stock" type="checkbox" checked> В наличии</label>
      <div class="adm-actions">
        <button type="button" class="btn btn-primary btn-sm f-save">Сохранить</button>
        <button type="button" class="btn btn-danger btn-sm f-del">Удалить</button>
      </div>
    </div>
  </article>
</template>
<datalist id="catList"></datalist>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-config.js?v=3"></script>
<script src="assets/js/store.js?v=3"></script>
<script src="assets/js/admin.js?v=4"></script>
</body>
</html>
