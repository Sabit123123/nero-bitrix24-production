<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 84" fill="none" role="img" aria-label="AquaUzel">
  <defs>
    <linearGradient id="lgDrop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="0.5" stop-color="#2A9DF4"/>
      <stop offset="1" stop-color="#0B63C4"/>
    </linearGradient>
    <linearGradient id="lgAqua" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5EC2FF"/>
      <stop offset="1" stop-color="#1E6FE0"/>
    </linearGradient>
    <linearGradient id="lgSteel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4F8FC"/>
      <stop offset="1" stop-color="#AEBccd"/>
    </linearGradient>
  </defs>

  <!-- emblem: manifold + drop -->
  <g transform="translate(6,8)">
    <rect x="4" y="22" width="56" height="24" rx="7" fill="url(#lgSteel)" stroke="#7C8BA0" stroke-width="1.2"/>
    <rect x="9" y="27" width="46" height="14" rx="4" fill="#0B1220" opacity="0.18"/>
    <!-- end caps -->
    <rect x="0" y="25" width="8" height="18" rx="3" fill="url(#lgSteel)" stroke="#7C8BA0" stroke-width="1"/>
    <rect x="56" y="25" width="8" height="18" rx="3" fill="url(#lgSteel)" stroke="#7C8BA0" stroke-width="1"/>
    <!-- outlets with valve handles -->
    <g>
      <rect x="14" y="46" width="6" height="12" rx="2" fill="#C6D1DE"/>
      <rect x="9" y="55" width="16" height="6" rx="3" fill="#E23B3B"/>
      <rect x="14.5" y="51" width="5" height="9" rx="2" fill="#E23B3B"/>
    </g>
    <g>
      <rect x="44" y="46" width="6" height="12" rx="2" fill="#C6D1DE"/>
      <rect x="39" y="55" width="16" height="6" rx="3" fill="#2A6FE0"/>
      <rect x="44.5" y="51" width="5" height="9" rx="2" fill="#2A6FE0"/>
    </g>
    <!-- water drop -->
    <path d="M32 0 C32 0 45 16 45 25 a13 13 0 0 1 -26 0 C19 16 32 0 32 0 Z" fill="url(#lgDrop)" stroke="#0B63C4" stroke-width="0.8"/>
    <ellipse cx="27.5" cy="22" rx="3.4" ry="5" fill="#EAF6FF" opacity="0.65"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(82,0)" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="40" letter-spacing="-1">
    <text x="0" y="55" fill="url(#lgAqua)">Aqua</text>
    <text x="92" y="55" fill="#EAF1F8">Uzel</text>
  </g>
  <rect x="82" y="63" width="172" height="3" rx="1.5" fill="url(#lgAqua)" opacity="0.55"/>
</svg>
