<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 460" fill="none" role="img" aria-label="Коллектор водоснабжения AquaUzel">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBFDFF"/>
      <stop offset="0.45" stop-color="#D5DEEA"/>
      <stop offset="0.55" stop-color="#AEBBCC"/>
      <stop offset="1" stop-color="#7E8DA1"/>
    </linearGradient>
    <linearGradient id="steelDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C7D2DF"/>
      <stop offset="1" stop-color="#6B7A8E"/>
    </linearGradient>
    <linearGradient id="redH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF6A6A"/><stop offset="1" stop-color="#C81E1E"/>
    </linearGradient>
    <linearGradient id="blueH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5C9DFF"/><stop offset="1" stop-color="#1648B8"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7DD3FC"/><stop offset="1" stop-color="#0E76D6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#1E90FF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#1E90FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#02050c" flood-opacity="0.55"/>
    </filter>
  </defs>

  <ellipse cx="280" cy="250" rx="250" ry="200" fill="url(#glow)"/>

  <g filter="url(#ds)">
    <!-- inlet stubs on top -->
    <g fill="url(#steelDark)" stroke="#5E6E82" stroke-width="2">
      <rect x="150" y="84" width="34" height="46" rx="7"/>
      <rect x="376" y="84" width="34" height="46" rx="7"/>
      <rect x="146" y="74" width="42" height="16" rx="5"/>
      <rect x="372" y="74" width="42" height="16" rx="5"/>
    </g>

    <!-- main horizontal body -->
    <rect x="96" y="122" width="368" height="92" rx="26" fill="url(#steel)" stroke="#76869A" stroke-width="2.5"/>
    <rect x="116" y="140" width="328" height="56" rx="16" fill="#0B1426" opacity="0.10"/>
    <rect x="120" y="135" width="320" height="9" rx="4.5" fill="#FFFFFF" opacity="0.7"/>
    <!-- bolt heads -->
    <g fill="#9AA8BA" stroke="#6A7B90" stroke-width="1.5">
      <circle cx="150" cy="168" r="6"/><circle cx="280" cy="168" r="6"/><circle cx="410" cy="168" r="6"/>
    </g>

    <!-- end caps -->
    <rect x="70" y="132" width="34" height="72" rx="12" fill="url(#steel)" stroke="#76869A" stroke-width="2.5"/>
    <rect x="456" y="132" width="34" height="72" rx="12" fill="url(#steel)" stroke="#76869A" stroke-width="2.5"/>
    <!-- pressure gauge on left cap -->
    <circle cx="58" cy="168" r="20" fill="#0E1726" stroke="#9AA8BA" stroke-width="3"/>
    <circle cx="58" cy="168" r="20" fill="none" stroke="url(#water)" stroke-width="3" stroke-dasharray="86 40" stroke-linecap="round" transform="rotate(135 58 168)"/>
    <line x1="58" y1="168" x2="68" y2="158" stroke="#7DD3FC" stroke-width="2.5" stroke-linecap="round"/>

    <!-- 4 outlets with valves -->
    <g>
      <!-- outlet template repeated -->
      <g transform="translate(150,0)">
        <rect x="-9" y="214" width="18" height="40" rx="5" fill="url(#steelDark)" stroke="#5E6E82" stroke-width="2"/>
        <rect x="-16" y="250" width="32" height="16" rx="6" fill="url(#steel)" stroke="#76869A" stroke-width="2"/>
        <!-- handle red -->
        <rect x="-30" y="270" width="60" height="15" rx="7.5" fill="url(#redH)"/>
        <rect x="-7" y="262" width="14" height="26" rx="5" fill="url(#redH)"/>
        <circle cx="0" cy="277" r="6" fill="#7E1111"/>
        <!-- threaded tail -->
        <rect x="-11" y="288" width="22" height="34" rx="4" fill="url(#steel)" stroke="#76869A" stroke-width="2"/>
        <g stroke="#8A98AB" stroke-width="2"><line x1="-11" y1="296" x2="11" y2="296"/><line x1="-11" y1="304" x2="11" y2="304"/><line x1="-11" y1="312" x2="11" y2="312"/></g>
      </g>
      <g transform="translate(237,0)">
        <rect x="-9" y="214" width="18" height="40" rx="5" fill="url(#steelDark)" stroke="#5E6E82" stroke-width="2"/>
        <rect x="-16" y="250" width="32" height="16" rx="6" fill="url(#steel)" stroke="#76869A" stroke-width="2"/>
        <rect x="-30" y="270" width="60" height="15" rx="7.5" fill="url(#redH)"/>
        <rect x="-7" y="262" width="14" height="26" rx="5" fill="url(#redH)"/>
        <circle cx="0" cy="277" r="6" fill="#7E1111"/>
        <rect x="-11" y="288" width="22" height="34" rx="4" fill="url(#steel)" stroke="#76869A" stroke-width="2"/>
        <g stroke="#8A98AB" stroke-width="2"><line x1="-11" y1="296" x2="11" y2="296"/><line x1="-11" y1="304" x2="11" y2="304"/><line x1="-11" y1="312" x2="11" y2="312"/></g>
      </g>
      <g transform="translate(324,0)">
        <rect x="-9" y="214" width="18" height="40" rx="5" fill="url(#steelDark)" stroke="#5E6E82" stroke-width="2"/>
        <rect x="-16" y="250" width="32" height="16" rx="6" fill="url(#steel)" stroke="#76869A" stroke-width="2"/>
        <rect x="-30" y="270" width="60" height="15" rx="7.5" fill="url(#blueH)"/>
        <rect x="-7" y="262" width="14" height="26" rx="5" fill="url(#blueH)"/>
        <circle cx="0" cy="277" r="6" fill="#0E2C6E"/>
        <rect x="-11" y="288" width="22" height="34" rx="4" fill="url(#steel)" stroke="#76869A" stroke-width="2"/>
        <g stroke="#8A98AB" stroke-width="2"><line x1="-11" y1="296" x2="11" y2="296"/><line x1="-11" y1="304" x2="11" y2="304"/><line x1="-11" y1="312" x2="11" y2="312"/></g>
      </g>
      <g transform="translate(411,0)">
        <rect x="-9" y="214" width="18" height="40" rx="5" fill="url(#steelDark)" stroke="#5E6E82" stroke-width="2"/>
        <rect x="-16" y="250" width="32" height="16" rx="6" fill="url(#steel)" stroke="#76869A" stroke-width="2"/>
        <rect x="-30" y="270" width="60" height="15" rx="7.5" fill="url(#blueH)"/>
        <rect x="-7" y="262" width="14" height="26" rx="5" fill="url(#blueH)"/>
        <circle cx="0" cy="277" r="6" fill="#0E2C6E"/>
        <rect x="-11" y="288" width="22" height="34" rx="4" fill="url(#steel)" stroke="#76869A" stroke-width="2"/>
        <g stroke="#8A98AB" stroke-width="2"><line x1="-11" y1="296" x2="11" y2="296"/><line x1="-11" y1="304" x2="11" y2="304"/><line x1="-11" y1="312" x2="11" y2="312"/></g>
      </g>
    </g>
  </g>

  <!-- water drops -->
  <g class="drip">
    <path d="M150 332 c0 0 7 9 7 14 a7 7 0 0 1 -14 0 c0 -5 7 -14 7 -14Z" fill="url(#water)"/>
    <path d="M411 340 c0 0 6 8 6 12 a6 6 0 0 1 -12 0 c0 -4 6 -12 6 -12Z" fill="url(#water)" opacity="0.85"/>
  </g>
</svg>
