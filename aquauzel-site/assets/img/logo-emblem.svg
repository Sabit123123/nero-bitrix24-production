<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 430" fill="none" role="img" aria-label="AquaUzel — эмблема">
  <defs>
    <linearGradient id="eSteel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCFEFF"/><stop offset=".45" stop-color="#DCE5EF"/>
      <stop offset=".55" stop-color="#B4C1D0"/><stop offset="1" stop-color="#7F8EA2"/>
    </linearGradient>
    <linearGradient id="eSteelV" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9EACBE"/><stop offset=".5" stop-color="#F4F8FC"/>
      <stop offset="1" stop-color="#8493A6"/>
    </linearGradient>
    <linearGradient id="eRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF6B6B"/><stop offset="1" stop-color="#C21A1A"/>
    </linearGradient>
    <linearGradient id="eBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5E9DFF"/><stop offset="1" stop-color="#13379E"/>
    </linearGradient>
    <linearGradient id="eDrop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8DD9FF"/><stop offset=".5" stop-color="#2A9DF4"/><stop offset="1" stop-color="#0A5CC0"/>
    </linearGradient>
    <linearGradient id="eAqua" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E84E6"/><stop offset="1" stop-color="#114Fb0"/>
    </linearGradient>
    <filter id="eds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#01040a" flood-opacity="0.5"/>
    </filter>
  </defs>

  <g filter="url(#eds)">
    <!-- top inlet stubs -->
    <g fill="url(#eSteelV)" stroke="#69788C" stroke-width="2">
      <rect x="150" y="52" width="40" height="40" rx="8"/>
      <rect x="290" y="52" width="40" height="40" rx="8"/>
      <rect x="144" y="44" width="52" height="16" rx="5"/>
      <rect x="284" y="44" width="52" height="16" rx="5"/>
    </g>

    <!-- end caps -->
    <rect x="40" y="96" width="44" height="118" rx="16" fill="url(#eSteel)" stroke="#69788C" stroke-width="2.5"/>
    <rect x="396" y="96" width="44" height="118" rx="16" fill="url(#eSteel)" stroke="#69788C" stroke-width="2.5"/>
    <g fill="#93A1B4" stroke="#69788C" stroke-width="1.4">
      <circle cx="62" cy="120" r="5"/><circle cx="62" cy="190" r="5"/>
      <circle cx="418" cy="120" r="5"/><circle cx="418" cy="190" r="5"/>
    </g>

    <!-- main body -->
    <rect x="70" y="86" width="340" height="138" rx="26" fill="url(#eSteel)" stroke="#69788C" stroke-width="3"/>
    <rect x="84" y="98" width="312" height="10" rx="5" fill="#fff" opacity=".7"/>

    <!-- inner white plate with wordmark -->
    <rect x="108" y="120" width="264" height="74" rx="12" fill="#F7FBFF" stroke="#C6D3E0" stroke-width="2"/>
    <text x="240" y="172" text-anchor="middle" font-family="Inter,'Segoe UI',Arial,sans-serif" font-weight="800" font-size="44" letter-spacing="-1.5">
      <tspan fill="url(#eAqua)">Aqua</tspan><tspan fill="#10243C">Uzel</tspan>
    </text>

    <!-- water drop on top center -->
    <path d="M240 8 C240 8 270 40 270 60 a30 30 0 0 1 -60 0 C210 40 240 8 240 8 Z" fill="url(#eDrop)" stroke="#0A5CC0" stroke-width="1.5"/>
    <ellipse cx="229" cy="52" rx="7" ry="11" fill="#EAF6FF" opacity=".6"/>

    <!-- 4 outlets: 2 red + 2 blue -->
    <g>
      <g transform="translate(140,0)" data-h="red">
        <rect x="-10" y="224" width="20" height="36" rx="5" fill="url(#eSteelV)" stroke="#69788C" stroke-width="2"/>
        <rect x="-34" y="256" width="68" height="17" rx="8.5" fill="url(#eRed)"/>
        <rect x="-8" y="248" width="16" height="30" rx="5" fill="url(#eRed)"/>
        <circle cx="0" cy="264" r="6.5" fill="#7C1010"/>
        <rect x="-12" y="278" width="24" height="40" rx="5" fill="url(#eSteel)" stroke="#69788C" stroke-width="2"/>
        <g stroke="#8593A6" stroke-width="2"><line x1="-12" y1="288" x2="12" y2="288"/><line x1="-12" y1="298" x2="12" y2="298"/><line x1="-12" y1="308" x2="12" y2="308"/></g>
      </g>
      <g transform="translate(207,0)" data-h="red">
        <rect x="-10" y="224" width="20" height="36" rx="5" fill="url(#eSteelV)" stroke="#69788C" stroke-width="2"/>
        <rect x="-34" y="256" width="68" height="17" rx="8.5" fill="url(#eRed)"/>
        <rect x="-8" y="248" width="16" height="30" rx="5" fill="url(#eRed)"/>
        <circle cx="0" cy="264" r="6.5" fill="#7C1010"/>
        <rect x="-12" y="278" width="24" height="40" rx="5" fill="url(#eSteel)" stroke="#69788C" stroke-width="2"/>
        <g stroke="#8593A6" stroke-width="2"><line x1="-12" y1="288" x2="12" y2="288"/><line x1="-12" y1="298" x2="12" y2="298"/><line x1="-12" y1="308" x2="12" y2="308"/></g>
      </g>
      <g transform="translate(274,0)" data-h="blue">
        <rect x="-10" y="224" width="20" height="36" rx="5" fill="url(#eSteelV)" stroke="#69788C" stroke-width="2"/>
        <rect x="-34" y="256" width="68" height="17" rx="8.5" fill="url(#eBlue)"/>
        <rect x="-8" y="248" width="16" height="30" rx="5" fill="url(#eBlue)"/>
        <circle cx="0" cy="264" r="6.5" fill="#0C2A66"/>
        <rect x="-12" y="278" width="24" height="40" rx="5" fill="url(#eSteel)" stroke="#69788C" stroke-width="2"/>
        <g stroke="#8593A6" stroke-width="2"><line x1="-12" y1="288" x2="12" y2="288"/><line x1="-12" y1="298" x2="12" y2="298"/><line x1="-12" y1="308" x2="12" y2="308"/></g>
      </g>
      <g transform="translate(341,0)" data-h="blue">
        <rect x="-10" y="224" width="20" height="36" rx="5" fill="url(#eSteelV)" stroke="#69788C" stroke-width="2"/>
        <rect x="-34" y="256" width="68" height="17" rx="8.5" fill="url(#eBlue)"/>
        <rect x="-8" y="248" width="16" height="30" rx="5" fill="url(#eBlue)"/>
        <circle cx="0" cy="264" r="6.5" fill="#0C2A66"/>
        <rect x="-12" y="278" width="24" height="40" rx="5" fill="url(#eSteel)" stroke="#69788C" stroke-width="2"/>
        <g stroke="#8593A6" stroke-width="2"><line x1="-12" y1="288" x2="12" y2="288"/><line x1="-12" y1="298" x2="12" y2="298"/><line x1="-12" y1="308" x2="12" y2="308"/></g>
      </g>
    </g>
  </g>
</svg>
