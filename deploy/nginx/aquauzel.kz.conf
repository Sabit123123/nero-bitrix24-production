# ===================================================================
# AquaUzel — nginx для статического сайта на VPS (ps.kz).
# Положить в /etc/nginx/sites-available/aquauzel.kz и слинковать в sites-enabled.
# HTTPS добавит certbot автоматически: sudo certbot --nginx -d aquauzel.kz -d www.aquauzel.kz
# Подробности — в DEPLOY-VPS.md.
# ===================================================================
server {
    listen 80;
    listen [::]:80;
    server_name aquauzel.kz www.aquauzel.kz;

    root /var/www/aquauzel;
    index index.html;

    # сжатие
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml application/manifest+json;

    # заголовки безопасности (наследуются во вложенные location, т.к. там нет своих add_header)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # статика кэшируется надолго — версии файлов меняются через ?v= в HTML
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|png|jpe?g|gif|webp|svg|ico)$ {
        expires 30d;
        access_log off;
    }

    # HTML всегда свежий (ревалидация)
    location ~* \.html?$ {
        expires -1;
    }

    location = /robots.txt  { access_log off; }
    location = /sitemap.xml { access_log off; }

    location / {
        try_files $uri $uri/ =404;
    }
}
